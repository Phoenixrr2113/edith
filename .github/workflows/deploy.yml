name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: [] # Railway auto-deploys on push — this workflow just gates on CI
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Lint
        run: bunx turbo run lint

      - name: Type check
        run: bunx turbo run typecheck

      - name: Tests
        run: |
          bun test packages/agent/tests/scheduler.test.ts packages/agent/tests/geo.test.ts packages/agent/tests/mcp-tools.test.ts packages/agent/tests/taskboard.test.ts packages/agent/tests/screenpipe.test.ts packages/agent/tests/dispatch.test.ts packages/agent/tests/briefs.test.ts
          bun test packages/agent/tests/handlers.test.ts
          bun test packages/agent/tests/dispatch-integration.test.ts

      - name: Deploy
        run: npx @railway/cli up --service edith --ci
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
